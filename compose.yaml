services:
  droppoint:
    build:
      context: .
    image: droppoint:local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DROPPOINT_HOST_BIND?set DROPPOINT_HOST_BIND in .env}:${DROPPOINT_PORT?set DROPPOINT_PORT in .env}:8080"
    volumes:
      - droppoint-data:/var/lib/droppoint

volumes:
  droppoint-data:
